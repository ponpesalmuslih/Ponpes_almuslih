<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSB Al-Muslih</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#eef2f7;
}
header{
  background:linear-gradient(135deg,#0b5ed7,#084298);
  color:#fff;
  text-align:center;
  padding:30px;
}
section{
  padding:20px;
  max-width:900px;
  margin:auto;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
input,textarea,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ddd;
}
button{
  background:#0b5ed7;
  color:#fff;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* KARTU VIP */
.kartu-wrap{
  display:none;
  text-align:center;
  margin-top:20px;
}
.kartu{
  width:360px;
  margin:auto;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 15px 30px rgba(0,0,0,.2);
  background:#fff;
  position:relative;
}
.kartu-header{
  background:linear-gradient(135deg,#0b5ed7,#084298);
  color:#fff;
  padding:15px;
  text-align:center;
}
.kartu-header h3{
  margin:0;
  font-size:16px;
}
.foto{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #fff;
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
}
.kartu-body{
  padding:60px 15px 15px;
  text-align:left;
}
.kartu-body p{
  margin:6px 0;
  font-size:14px;
}
.qr{
  margin-top:10px;
  text-align:center;
}
.kartu-footer{
  background:#f1f3f5;
  padding:10px;
  font-size:12px;
  text-align:center;
}
.btn{
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Pendaftaran Santri Baru</h1>
<p>Pondok Pesantren Al-Muslih</p>
</header>

<section>

<div class="card">
<h2>Formulir Pendaftaran</h2>

<form onsubmit="kirim(event)">
<input id="nama" placeholder="Nama Lengkap" required>
<input id="ttl" placeholder="Tempat, Tanggal Lahir" required>
<input id="hp" placeholder="No WhatsApp">

<select id="program">
<option>Reguler</option>
<option>Tahfidz</option>
</select>

<label>Upload Foto</label>
<input type="file" id="foto" accept="image/*" required>

<button type="submit">Daftar</button>
</form>
</div>

<!-- KARTU -->
<div class="kartu-wrap" id="kartuWrap">

<div class="kartu">
  <div class="kartu-header">
    <h3>KARTU SANTRI</h3>
    <small>Al-Muslih</small>
  </div>

  <img id="fotoPreview" class="foto">

  <div class="kartu-body">
    <p id="kNama"></p>
    <p id="kProgram"></p>
    <p id="kNo"></p>

    <div class="qr" id="qr"></div>
  </div>

  <div class="kartu-footer">
    Simpan kartu ini sebagai bukti pendaftaran
  </div>
</div>

<button class="btn" onclick="window.print()">Print / Save</button>

</div>

</section>

<script>
function kirim(e){
  e.preventDefault();

  let no = "ALM-" + Date.now();

  // tampilkan kartu
  document.getElementById('kartuWrap').style.display = 'block';

  document.getElementById('kNama').innerText = "Nama: " + nama.value;
  document.getElementById('kProgram').innerText = "Program: " + program.value;
  document.getElementById('kNo').innerText = "No: " + no;

  // tampilkan foto
  let file = document.getElementById('foto').files[0];
  let reader = new FileReader();

  reader.onload = function(){
    document.getElementById('fotoPreview').src = reader.result;
  }
  reader.readAsDataURL(file);

  // QR Code
  document.getElementById('qr').innerHTML = "";
  new QRCode(document.getElementById('qr'), {
    text: no,
    width: 80,
    height: 80
  });

  // WhatsApp otomatis
  let pesan = `Assalamu'alaikum, saya telah mendaftar.
Nama: ${nama.value}
No: ${no}`;

  window.open(`https://wa.me/6281234567890?text=${encodeURIComponent(pesan)}`,'_blank');
}
</script>

</body>
  </html>
